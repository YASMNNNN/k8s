apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: plateforme-electronique
data:
  REACT_APP_API_BASE_URL: "http://api-gateway:8080/api"
  REACT_APP_KEYCLOAK_URL: "http://keycloak:8080"
  REACT_APP_KEYCLOAK_REALM: "plateforme-electronique"
  REACT_APP_KEYCLOAK_CLIENT_ID: "plateforme-frontend"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: plateforme-electronique
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: plateforme_electronique_k8s-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        envFrom:
        - configMapRef:
            name: frontend-config
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: plateforme-electronique
  labels:
    app: frontend
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
    protocol: TCP
    name: http
  selector:
    app: frontend
