apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: plateforme-electronique

resources:
  # Namespace
  - namespace.yaml

  # Secrets and ConfigMaps
  - secrets.yaml
  - postgres-init-configmap.yaml

  # Storage
  - postgres-storage.yaml
  - redis-storage.yaml

  # Infrastructure Services
  - postgresql.yaml
  - redis.yaml
  - keycloak.yaml

  # Microservices
  - eureka-server.yaml
  - api-gateway.yaml
  - invoice-service.yaml
  - payment-service.yaml
  - subscription-service.yaml
  - notification-service.yaml
  - user-auth-service.yaml
  - signature-service.yaml

  # Frontend
  - frontend.yaml

# Common labels for all resources
commonLabels:
  app.kubernetes.io/part-of: plateforme-electronique
  app.kubernetes.io/managed-by: argocd

# Images to use from Docker Hub
images:
  # Infrastructure
  - name: k3d-registry.localhost:5111/postgres
    newTag: 15-alpine
  - name: k3d-registry.localhost:5111/redis
    newTag: 7-alpine
  - name: k3d-registry.localhost:5111/keycloak
    newTag: "22.0"
  # Microservices
  - name: k3d-registry.localhost:5111/eureka-server
    newTag: latest
  - name: k3d-registry.localhost:5111/api-gateway
    newTag: latest
  - name: k3d-registry.localhost:5111/invoice-service
    newTag: latest
  - name: k3d-registry.localhost:5111/payment-service
    newTag: latest
  - name: k3d-registry.localhost:5111/subscription-service
    newTag: latest
  - name: k3d-registry.localhost:5111/notification-service
    newTag: latest
  - name: k3d-registry.localhost:5111/user-auth-service
    newTag: latest
  - name: k3d-registry.localhost:5111/signature-service
    newTag: latest
  - name: k3d-registry.localhost:5111/frontend
    newTag: latest
